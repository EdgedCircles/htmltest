<html>
    <head></head>
    <title>js2</title>
    <body>
        <h1 id="heading">Hello, World!</h1>
    </body>
    <script>
        for (var i = 0; i < 10; i++) {
            console.log(i);
        }
        var str = "this is my method test";
        str = str.toUpperCase();
        document.getElementById("heading").innerHTML = str;
        var x = 5;
        switch (x) {
            case 1:
                console.log("x is 1");
                break;
            case 2:
                console.log("x is 2");
                break;
            case 3:
                console.log("x is 3");
                break;
            case 4:
                console.log("x is 4");
                break;
            case 5:
                console.log("x is 5");
                break;
            default:
                console.log("x is not between 1 and 5");
        }
    </script>
</html>
